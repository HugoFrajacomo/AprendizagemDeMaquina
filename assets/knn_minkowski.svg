<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 350" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f16"/>
      <stop offset="100%" stop-color="#181824"/>
    </linearGradient>

    <!-- Formula Box Background -->
    <linearGradient id="formulaBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#212230" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1b1c26" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Neon shadows -->
    <filter id="crimsonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#ff4d6d" flood-opacity="0.5"/>
    </filter>
    <filter id="tealGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00b3b3" flood-opacity="0.5"/>
    </filter>
    <filter id="goldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#ffd700" flood-opacity="0.8"/>
    </filter>
  </defs>

  <style>
    .title { font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; font-size: 22px; font-weight: 800; fill: #ffffff; letter-spacing: 1px; }
    .subtitle { font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; font-size: 12px; fill: #8b949e; letter-spacing: 0.5px; }
    .card-title { font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; font-size: 14px; font-weight: 700; fill: #ffd700; }
    .body-text { font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; font-size: 11px; fill: #e1e4e8; }
    .latex-style { font-family: 'Georgia', serif; font-style: italic; font-size: 14px; fill: #ffffff; }
    .axis-label { font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; font-size: 11px; fill: #8b949e; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="15"/>
  <rect width="99.6%" height="99%" x="0.2%" y="0.5%" fill="none" stroke="#2d3139" stroke-width="1.5" rx="15"/>

  <!-- Header -->
  <g transform="translate(40, 45)">
    <text class="title" x="0" y="0">CLASSIFICADOR K-NEAREST NEIGHBORS (KNN)</text>
    <text class="subtitle" x="0" y="20">Espaço vetorial bidimensional e distância métrica de Minkowski (p=2, Euclidiana) para K=5</text>
  </g>

  <!-- Plot Area Grid -->
  <g transform="translate(60, 90)">
    <!-- Grid lines -->
    <path d="M 50 40 L 450 40 M 50 90 L 450 90 M 50 140 L 450 140 M 50 190 L 450 190" stroke="#1f2330" stroke-width="1"/>
    <path d="M 130 10 L 130 200 M 210 10 L 210 200 M 290 10 L 290 200 M 370 10 L 370 200" stroke="#1f2330" stroke-width="1"/>

    <!-- X and Y Axes -->
    <line x1="50" y1="200" x2="450" y2="200" stroke="#8b949e" stroke-width="2"/>
    <line x1="50" y1="10" x2="50" y2="200" stroke="#8b949e" stroke-width="2"/>
    <text class="axis-label" x="420" y="218">Álcool (x₁)</text>
    <text class="axis-label" x="20" y="10" transform="rotate(-90 20 10)">Acidez Volátil (x₂)</text>

    <!-- Data points for low quality (Crimson) -->
    <circle cx="80" cy="50" r="7" fill="#ff4d6d" opacity="0.8"/>
    <circle cx="110" cy="110" r="7" fill="#ff4d6d" opacity="0.8"/>
    <circle cx="170" cy="60" r="7" fill="#ff4d6d" opacity="0.8"/>
    <!-- Neighbors inside k=5 range -->
    <circle id="n1" cx="210" cy="120" r="7" fill="#ff4d6d" stroke="#ffffff" stroke-width="1.5" filter="url(#crimsonGlow)"/>
    <circle id="n2" cx="260" cy="160" r="7" fill="#ff4d6d" stroke="#ffffff" stroke-width="1.5" filter="url(#crimsonGlow)"/>

    <!-- Data points for high quality (Teal) -->
    <circle cx="390" cy="80" r="7" fill="#00b3b3" opacity="0.8"/>
    <circle cx="420" cy="130" r="7" fill="#00b3b3" opacity="0.8"/>
    <circle cx="330" cy="40" r="7" fill="#00b3b3" opacity="0.8"/>
    <!-- Neighbors inside k=5 range -->
    <circle id="n3" cx="290" cy="90" r="7" fill="#00b3b3" stroke="#ffffff" stroke-width="1.5" filter="url(#tealGlow)"/>
    <circle id="n4" cx="300" cy="140" r="7" fill="#00b3b3" stroke="#ffffff" stroke-width="1.5" filter="url(#tealGlow)"/>
    <circle id="n5" cx="230" cy="70" r="7" fill="#00b3b3" stroke="#ffffff" stroke-width="1.5" filter="url(#tealGlow)"/>

    <!-- K=5 Decision Boundary Circle around New Sample (x_new) -->
    <!-- Center: x=255, y=105. Radius: 68px -->
    <circle cx="255" cy="105" r="72" fill="none" stroke="#ffd700" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.6"/>

    <!-- New Query Point (Gold Star representation / glowing yellow circle) -->
    <circle cx="255" cy="105" r="9" fill="#ffd700" stroke="#ffffff" stroke-width="2" filter="url(#goldGlow)"/>
    <text class="axis-label" fill="#ffd700" font-weight="bold" x="240" y="125">x_novo</text>

    <!-- Distance connection lines to nearest neighbors -->
    <line x1="255" y1="105" x2="210" y2="120" stroke="#ffd700" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="255" y1="105" x2="260" y2="160" stroke="#ffd700" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="255" y1="105" x2="290" y2="90" stroke="#ffd700" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="255" y1="105" x2="300" y2="140" stroke="#ffd700" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="255" y1="105" x2="230" y2="70" stroke="#ffd700" stroke-width="1" stroke-dasharray="2,2"/>
  </g>

  <!-- Explanation Card -->
  <g transform="translate(540, 90)">
    <rect width="420" height="200" rx="12" fill="url(#formulaBg)" stroke="#2d3042" stroke-width="2"/>
    <text class="card-title" x="20" y="30">Votação por Distância (K=5)</text>

    <!-- Minkowski formula -->
    <text class="latex-style" x="20" y="65">Distância de Minkowski (p=2 → Euclidiana):</text>
    
    <rect x="20" y="80" width="380" height="40" rx="6" fill="#151620" stroke="#ffd700" stroke-opacity="0.3" stroke-width="1"/>
    <text class="latex-style" font-size="14px" x="40" y="105">D(x, y) = √ [ ∑ |x_i - y_i|² ]</text>

    <text class="body-text" x="20" y="145">Análise dos vizinhos mais próximos encontrados:</text>

    <!-- Circle bullet points for voting -->
    <g transform="translate(20, 160)">
      <!-- Low Quality -->
      <circle cx="10" cy="5" r="5" fill="#ff4d6d"/>
      <text class="body-text" x="25" y="9">2 Vizinhos Baixa Qualidade (Vermelhos)</text>

      <!-- High Quality -->
      <circle cx="10" cy="23" r="5" fill="#00b3b3"/>
      <text class="body-text" x="25" y="27">3 Vizinhos Alta Qualidade (Teais)</text>
    </g>

    <!-- Decision -->
    <rect x="250" y="145" width="150" height="40" rx="6" fill="#003333" stroke="#00b3b3" stroke-width="1"/>
    <text class="body-text" font-weight="bold" fill="#00ffd2" x="260" y="160">Voto da Maioria:</text>
    <text class="body-text" font-weight="bold" fill="#ffffff" x="260" y="176">Alta Qualidade (3 vs 2)</text>
  </g>
</svg>
